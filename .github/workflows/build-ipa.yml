name: Build and Release IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project CloudNow.xcodeproj \
            -scheme CloudNow \
            -clonedSourcePackagesDirPath .spm-packages

      - name: Archive
        run: |
          xcodebuild archive \
            -project CloudNow.xcodeproj \
            -scheme CloudNow \
            -configuration Release \
            -destination "generic/platform=tvOS" \
            -archivePath "$RUNNER_TEMP/CloudNow.xcarchive" \
            -clonedSourcePackagesDirPath .spm-packages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$RUNNER_TEMP/CloudNow.xcarchive/Products/Applications/CloudNow.app" \
            "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r CloudNow.ipa Payload/

      - name: Generate release tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="v$(date +%Y.%m.%d)-${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=CloudNow ${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          files: ${{ runner.temp }}/CloudNow.ipa
          generate_release_notes: true
